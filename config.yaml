# OptionsPilot user configuration.
# Anything omitted falls back to safe defaults (see docs/ARCHITECTURE.md §2.11).
# Environment variables override this file: OPTIONSPILOT__RISK__RISK_PER_TRADE_PCT=0.5

data:
  provider: yfinance
  watchlist: [SPY, QQQ, AAPL, NVDA, TSLA]
  timeframes: [1d, 4h, 1h, 15m, 5m]

engine:
  min_confidence: 80        # the conservative bar; also the base for high-risk tiers
  # Trading mode — "conservative" (default) or "high_risk":
  #   conservative: only trade at >= min_confidence. Accuracy over frequency.
  #   high_risk:    the bar adapts to setup quality (excellent 62 / good 70 /
  #                 average 77 with the default base of 80; poor setups never
  #                 trade). Entries below min_confidence also require
  #                 risk/reward >= high_risk_min_rr_stretch. All risk limits,
  #                 stops and position sizing stay fully enforced.
  trading_mode: conservative
  # Operating mode — "ai" (default) or "human":
  #   ai:    the engine places entries itself (through the risk manager) and
  #          manages its own stops/targets.
  #   human: the engine still scans and scores every symbol, but only advises
  #          (one notification per tradeable signal) — YOU place every order
  #          from the Trade tab, and the AI coach reviews each closed trade.
  # Switchable live from the app header; the in-app choice is persisted in
  # data/settings.json and overrides this value on the next start.
  operating_mode: ai
  high_risk_floor: 60           # never trade below this confidence, ever
  high_risk_min_rr_stretch: 2.0 # RR required for below-base-confidence entries
  target_delta: 0.45
  min_dte: 7
  max_dte: 45
  max_spread_pct: 0.10      # reject option spreads wider than 10% of mid
  min_open_interest: 200
  min_option_volume: 50

risk:
  starting_balance: 25000
  risk_per_trade_pct: 1.0
  max_daily_loss_pct: 3.0
  max_weekly_loss_pct: 6.0
  max_drawdown_pct: 15.0
  max_consecutive_losses: 3
  max_contracts: 10
  max_open_positions: 3
  daily_trade_limit: 5
  min_risk_reward: 1.5
  cooldown_minutes_after_loss: 15
  trading_start: "09:45"    # ET — skip opening chop
  trading_end: "15:30"      # ET — no new entries near the close

broker:
  name: paper               # v1: paper only. Live requires explicit two-flag opt-in.
  commission_per_contract: 0.65
  slippage_pct: 0.01

notify:
  desktop: true
  email: false
  daily_summary: true
  weekly_summary: true

# TradingView alerts (inbound webhook). An alert triggers a scan of that
# symbol through the full engine + risk pipeline — it can never place an
# order directly. Alert message format in TradingView:
#   {"secret": "<your secret>", "symbol": "{{ticker}}", "note": "optional"}
# POST it to http://<host>:<port>/webhook/tradingview
integrations:
  tradingview_webhook: false
  tradingview_secret: ""      # required (16+ chars) when enabling the webhook

logging:
  level: INFO
